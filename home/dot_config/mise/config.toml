[tools]
terraform = 'latest'
node = 'lts'
python = 'latest'
ruby = 'latest'
go = 'latest'
rust = 'latest'
lua = 'latest'
actionlint = "latest"
awscli = "latest"
gh = "latest"
lazydocker = "latest"
peco = "latest"
shellcheck = "latest"
vim = "latest"
bun = "latest"
uv = "latest"
neovim = "latest"
"pipx:ansible" = "latest"
"github:koh-sh/ccnewline" = { version = "latest", minimum_release_age = "0d" }
"github:koh-sh/codebuild-multirunner" = { version = "latest", minimum_release_age = "0d" }
"github:koh-sh/apcdeploy" = { version = "latest", minimum_release_age = "0d" }
fnox = "latest"
"github:jorgerojas26/lazysql" = "latest"
mysql = "latest"
delta = "latest"
"github:genkiroid/cert" = "latest"
"github:koh-sh/commd" = { version = "latest", minimum_release_age = "0d" }
pinact = "latest"
"github:koki-develop/ghasec" = "latest"
"github:charmbracelet/vhs" = "latest"

[env]
MISE_PYTHON_DEFAULT_PACKAGES_FILE = '~/.config/mise/default-python-packages'
MISE_NODE_DEFAULT_PACKAGES_FILE = '~/.config/mise/default-npm-packages'

[settings]
idiomatic_version_file_enable_tools = [
  "go",
  "node",
  "python",
  "ruby",
  "terraform",
]
experimental = true
minimum_release_age = "3d"

[settings.python]
compile = false

[tasks.bump]
description = "Bump tools and packages"
run = """
brew update && brew upgrade && brew upgrade --casks
brew upgrade --cask wezterm@nightly --greedy-latest
mise up
claude update
"""
